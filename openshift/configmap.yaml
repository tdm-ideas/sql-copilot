apiVersion: v1
kind: ConfigMap
metadata:
  name: sql-copilot-config
  namespace: sql-copilot
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  OLLAMA_BASE_URL: "http://sql-copilot-ollama:11434"
  ALLOWED_ORIGINS: "https://sql-copilot.apps.your-cluster.example.com"
  OLLAMA_KEEP_ALIVE: "24h"
